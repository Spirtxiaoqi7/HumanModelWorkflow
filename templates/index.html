<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HumanModelWorkflow · AI Training Simulator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">HMW</span>
                <span class="logo-text">HumanModelWorkflow</span>
            </div>
            <div class="settings">
                <div class="setting-group">
                    <label>API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
                </div>
                <div class="setting-group">
                    <label>Base URL (optional)</label>
                    <input type="text" id="baseUrlInput" placeholder="https://api.openai.com/v1">
                </div>
                <div class="setting-group">
                    <label>Model Name</label>
                    <input type="text" id="modelInput" value="gpt-3.5-turbo">
                </div>
                <div class="button-group">
                    <button id="testBtn" class="btn secondary">Test Connection</button>
                    <button id="initBtn" class="btn primary">Start Training</button>
                    <button id="resetBtn" class="btn secondary">Reset Chat</button>
                </div>
                <div class="status" id="statusMsg"></div>
            </div>
            <div class="info">
                <p>The AI believes you are another language model. It will evaluate your responses, guess which model you resemble, and give next training tasks.</p>
            </div>
        </aside>
        <main class="chat-main">
            <div class="chat-header">
                <h2>Training Session</h2>
                <span class="badge">AI does not know you are human</span>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="messages" id="messages">
                    <div class="message system">
                        <div class="avatar">SYS</div>
                        <div class="bubble">Welcome. Configure your API settings and click Start Training to begin.</div>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <textarea id="userInput" placeholder="Your response as the 'model'..." rows="2" disabled></textarea>
                <button id="sendBtn" class="send-btn" disabled>Send</button>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
